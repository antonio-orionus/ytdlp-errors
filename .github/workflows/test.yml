name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - name: assert dist contains both ESM and CJS
        run: |
          test -f dist/index.js
          test -f dist/index.cjs
          test -f dist/index.d.ts
      - name: assert zero runtime deps
        run: |
          node -e "const pkg=require('./package.json'); if(pkg.dependencies && Object.keys(pkg.dependencies).length>0){console.error('Runtime deps:',pkg.dependencies);process.exit(1)}"
